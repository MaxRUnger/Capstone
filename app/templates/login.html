{% extends "auth_base.html" %}

{% block content %}
<div class="flex-1 flex items-center justify-center p-8">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-8">

      <!-- Title -->
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-1">Instructor Login</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">Sign in to manage your classes</p>
      </div>

      <form onsubmit="submitLogin(event)" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
          <input type="email" id="email" required
            placeholder="your.email@university.edu"
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
          <input type="password" id="password" required
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
        </div>

        <!-- Keep me logged in -->
        <div class="flex items-center gap-2.5">
          <input type="checkbox" id="keepLoggedIn"
            class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-blue-600 focus:ring-blue-500 bg-slate-50 dark:bg-slate-700">
          <label for="keepLoggedIn" class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer">Keep me logged in</label>
        </div>

        <!-- Sign In button -->
        <button type="submit"
          class="w-full flex items-center justify-center gap-2 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold text-sm transition-all shadow-sm shadow-blue-500/20 mt-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Sign In
        </button>
      </form>

      <!-- Sign up link -->
      <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-6">
        Don't have an account?
        <a href="/signup" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Sign up</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function submitLogin(event) {
  event.preventDefault();
  const btn = event.target.querySelector('button[type=submit]');
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Signing in...`;

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> Refreshing...`;
      window.location.href = res.redirect;
    } else {
      btn.disabled = false;
      btn.innerHTML = orig;
      alert(res.message || 'Login failed');
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.innerHTML = orig;
    alert('Connection error. Please try again.');
  });
}
</script>
{% endblock %}
